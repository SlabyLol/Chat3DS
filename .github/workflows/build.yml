name: Build 3DS Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile 3DS-Chat.3dsx
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code auschecken ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. devkitPro pacman via .deb von GitHub Releases installieren ────────
      #    (apt.devkitpro.org ist durch Cloudflare WAF für wget gesperrt,
      #     daher direkt von github.com/devkitPro/pacman/releases laden)
      - name: Install devkitPro pacman (.deb from GitHub Releases)
        run: |
          # Neueste .deb direkt von GitHub laden – kein Cloudflare-Problem
          wget -q \
            "https://github.com/devkitPro/pacman/releases/download/v6.0.2/devkitpro-pacman.amd64.deb" \
            -O /tmp/dkp-pacman.deb

          sudo dpkg -i /tmp/dkp-pacman.deb || true
          # dpkg hinterlässt ggf. fehlende Abhängigkeiten – beheben:
          sudo apt-get install -f -y

          # Umgebung setzen
          echo "DEVKITPRO=/opt/devkitpro"         >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin"           >> $GITHUB_PATH

      # ── 3. Paketdatenbank aktualisieren & 3DS-Bibliotheken installieren ──────
      - name: Install 3DS toolchain and libraries
        run: |
          sudo dkp-pacman -Sy --noconfirm
          sudo dkp-pacman -S --noconfirm \
            3ds-dev \
            devkitARM \
            libctru \
            citro2d \
            citro3d

      # ── 4. Projekt bauen ────────────────────────────────────────────────────
      - name: Build 3DS-Chat
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          make -j$(nproc)

      # ── 5. Artefakte hochladen ───────────────────────────────────────────────
      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DS-Chat
          path: |
            3ds-chat.3dsx
            3ds-chat.smdh
          retention-days: 30

      # ── 6. Release erstellen (nur bei Tag) ───────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            3ds-chat.3dsx
            3ds-chat.smdh
          body: |
            ## 3DS-Chat ${{ github.ref_name }}

            ### Installation
            1. `.3dsx` in `/3ds/3DS-Chat/` auf der SD-Karte kopieren
            2. Homebrew Launcher starten → App auswählen

            ### Steuerung
            | Taste | Aktion |
            |-------|--------|
            | D-Pad Links/Rechts | HOST / JOIN wählen |
            | **A** | Bestätigen / Nachricht schreiben |
            | **B** | Passwort-Schutz an/aus (Menü) / Trennen (Chat) |
            | **D-Pad ↑↓** | Chat scrollen |
            | **START** | Beenden / Hauptmenü |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
