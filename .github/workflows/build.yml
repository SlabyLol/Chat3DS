name: Build 3DS Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile 3DS-Chat.3dsx
    runs-on: ubuntu-latest

    # Offizielles devkitPro Docker-Image – kein apt.devkitpro.org nötig!
    # Enthält devkitARM, libctru, citro2d, citro3d bereits vorinstalliert.
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # citro2d/citro3d nachinstallieren falls nicht im Base-Image
      - name: Install citro2d and citro3d
        run: |
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --noconfirm 3ds-dev citro2d citro3d || true

      - name: Build 3DS-Chat
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          make -j$(nproc)

      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DS-Chat
          path: |
            3ds-chat.3dsx
            3ds-chat.smdh
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            3ds-chat.3dsx
            3ds-chat.smdh
          body: |
            ## 3DS-Chat ${{ github.ref_name }}

            ### Installation
            1. `.3dsx` in `/3ds/3DS-Chat/` auf der SD-Karte kopieren
            2. Homebrew Launcher starten → App auswählen

            ### Steuerung
            | Taste | Aktion |
            |-------|--------|
            | D-Pad Links/Rechts | HOST / JOIN wählen |
            | **A** | Bestätigen / Nachricht schreiben |
            | **B** | Passwort an/aus (Menü) / Trennen (Chat) |
            | **D-Pad ↑↓** | Chat scrollen |
            | **START** | Beenden / Hauptmenü |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
